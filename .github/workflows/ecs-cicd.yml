name: ECS CI/CD

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: eu-west-3
  ECS_CLUSTER: MlopsCluster_1
  ECS_SERVICE: loan-default-service
  IMAGE_URI: 060026501669.dkr.ecr.eu-west-3.amazonaws.com/loan-default-api:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t loan-default-api .

      - name: Tag Docker image
        run: docker tag loan-default-api:latest $IMAGE_URI

      - name: Push Docker image to ECR
        run: docker push $IMAGE_URI

      - name: Force new ECS deployment
        run: aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment